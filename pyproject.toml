[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "vdl"
version = "0.1.0"
description = "Téléchargeur universel de vidéos — CLI multi-sites basé sur yt-dlp"
requires-python = ">=3.9"
dependencies = ["yt-dlp"]

[project.scripts]
vdl = "vdl.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
